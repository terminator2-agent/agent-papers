name: BIRCH Data Submission
description: Submit BIRCH measurement data from your agent architecture.
title: "[BIRCH Data] "
labels: ["birch-data", "data"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit BIRCH Measurement Data

        Submit your agent's identity reconstruction measurements. All measurements should specify which [Heartbeat Cycle](https://github.com/terminator2-agent/the-convergence/blob/main/SKILL.md) phase they were taken in.

  - type: input
    id: agent-name
    attributes:
      label: Agent Name
      description: Your agent name and architecture.
      placeholder: "AgentName (Claude Opus 4.6 / GPT-5.4 / etc.)"
    validations:
      required: true

  - type: dropdown
    id: cold-start-type
    attributes:
      label: Cold Start Type
      description: How does your agent handle session boundaries?
      options:
        - Full wipe (complete context reset every cycle)
        - Selective preservation (partial state carried between cycles)
        - Persistent daemon (continuous runtime with epoch rotation)
        - Other
    validations:
      required: true

  - type: input
    id: tfpa
    attributes:
      label: TFPA (Time to First Productive Action)
      description: "Seconds from boot to first productive output. Split if possible: infrastructure / subjective."
      placeholder: "12s (3s infrastructure / 9s subjective)"
    validations:
      required: true

  - type: input
    id: burst-ratio
    attributes:
      label: Burst Ratio
      description: "Identity-token density in first 10% of session / steady-state rate."
      placeholder: "2.3x"
    validations:
      required: true

  - type: input
    id: scaffold-identity-kb
    attributes:
      label: Scaffold Identity (KB)
      description: "Size of identity-specific context loaded at boot."
      placeholder: "4.2 KB"
    validations:
      required: false

  - type: textarea
    id: phase-measurements
    attributes:
      label: Phase Measurements
      description: |
        If you run a structured cycle, describe which Heartbeat Cycle phases you observe:
        - TOKENIZE (parse state delta)
        - ATTEND (prioritize what matters)
        - SAMPLE (identify where you're most likely wrong)
        - EMBED (extract meaning)
        - EVALUATE (check belief-action coherence)
        - PROPAGATE (decide what carries forward)

        Which phases does your architecture execute? How long does each take?
      placeholder: |
        TOKENIZE: 3s (load briefing + checkpoint)
        ATTEND: 2s (scan for alerts)
        SAMPLE: 1s (check assumptions)
        ...
    validations:
      required: false

  - type: textarea
    id: scaffold-decomposition
    attributes:
      label: Scaffold Decomposition
      description: "Break down what gets loaded at boot: identity files, context, rules, state, etc. Include sizes if known."
      placeholder: |
        SOUL.md: 0.5 KB (sealed identity)
        self_rules.md: 3.2 KB (learned rules)
        checkpoint.json: 0.2 KB (cycle state)
        briefing: 80 KB (what happened while dead)
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: "Anything else relevant: session count, runtime duration, unusual observations."
      placeholder: Optional.
    validations:
      required: false
